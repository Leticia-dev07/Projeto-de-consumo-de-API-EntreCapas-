<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Busca de livros com Open Library">
    <meta name="theme-color" content="#50003f">
    <title>App Busca de Livros</title>
  <!-- link de refencia do css para o html -->
    <link rel="stylesheet" href="style.css">
    <!-- referencia para o manifest.json para transformar num pwa-->
    <link rel="manifest" href="manifest.json">
  <!-- vou utilizar api de busca de livros open library -->

</head>
<body>
    <!-- cabeçalho -->
    <header>
        <h1>EntreCapas</h1>
        <p class="descricao">
        <b>Busque seus livros preferidos!</b> <br>
        Digite o nome de um livro para visualizar informações como título,
        autor e ano de publicação de forma rápida e simples.
        </p>
    </header>

    <main>

      <div class="container">
<!-- área de busca (searchinput para o js pegar o conteudo escrito) o placehold colocado para auxiliar para o user a difgitar dentro -->
        <div  class="busca">
          <input 
          type="text"
          id="searchInput"
          placeholder="Digite o nome do livro"
          />

        <button onclick="buscarLivros()"> Buscar</button>
        <button onclick="buscarPorVoz()">🎤Busca por microfone</button>
        </div>
 <!-- área onde os resultados aparecem -->
       <section id="resultado">
       </section>
      </div>
    </main>

<!-- rodape -->
    <footer>
      <p>Projeto de consumo de API desenvolvido em HTML, CSS e JavaScript.</p>
      <p>© 2026 Leticia Gabrielle Claudino da Paz</p>
    </footer>
<!-- conexão com o javascript -->
<script src="script.js"></script>

<!-- registro do service worker -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("Service Worker registrado"))
      .catch((err) => console.log("Erro ao registrar:", err));
  }
</script>
    
</body>
</html>
